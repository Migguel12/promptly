name: Promptly CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t promptly-api:test ./api

      - name: Run Container for Smoke Test
        run: |
          docker run -d -p 8000:8000 --name api-test promptly-api:test
          sleep 5
          curl http://localhost:8000/

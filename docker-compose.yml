version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: promptly_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: promptly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d promptly"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: promptly_api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/promptly
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
